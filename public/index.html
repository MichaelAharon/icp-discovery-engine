<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Askit.ai — ICP Discovery Engine</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
<style>
:root{--bg:#06060e;--card:rgba(255,255,255,0.035);--border:rgba(255,255,255,0.07);--hover:rgba(255,255,255,0.06);--t1:#f4f2ff;--t2:#9d97b8;--t3:#504a6b;--violet:#a78bfa;--vb:#c4b5fd;--vg:rgba(167,139,250,0.12);--cyan:#67e8f9;--cg:rgba(103,232,249,0.10);--rose:#fb7185;--rg:rgba(251,113,133,0.10);--lime:#a3e635;--lg:rgba(163,230,53,0.10);--amber:#fbbf24;--ag:rgba(251,191,36,0.10);--emerald:#34d399;--eg:rgba(52,211,153,0.12);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--t1);font-family:'Outfit',sans-serif;min-height:100vh;}
.orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;}
.orb-1{width:600px;height:600px;background:radial-gradient(circle,rgba(52,211,153,0.1),transparent 70%);top:-200px;left:-100px;}
.orb-2{width:500px;height:500px;background:radial-gradient(circle,rgba(103,232,249,0.07),transparent 70%);bottom:-150px;right:-100px;}
.app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:0 24px;}

/* Header */
.header{padding:36px 0 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.logo-row{display:flex;align-items:center;gap:12px;}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--emerald),var(--cyan));border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;color:var(--bg);}
.logo-stack h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--emerald),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-stack p{font-size:11px;color:var(--t3);margin-top:1px;}
.badge-row{display:flex;gap:8px;align-items:center;}
.badge{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);padding:6px 14px;border-radius:100px;font-size:11px;color:var(--t2);font-weight:500;}
.dot{width:6px;height:6px;border-radius:50%;animation:pulse 2s ease infinite;}
.dot.g{background:var(--lime);box-shadow:0 0 8px var(--lime);}
.dot.a{background:var(--amber);box-shadow:0 0 8px var(--amber);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* Input */
.input-area{margin-bottom:24px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 24px;}
.input-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);margin-bottom:10px;}
.input-flex{display:flex;gap:10px;align-items:center;}
.url-input{flex:1;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--t1);font-family:'Space Mono',monospace;font-size:13px;outline:none;transition:border-color 0.2s;}
.url-input:focus{border-color:var(--emerald);}
.url-input::placeholder{color:var(--t3);}
.btn{border:none;border-radius:10px;padding:12px 24px;font-family:'Outfit',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.btn-run{background:linear-gradient(135deg,var(--emerald),#10b981);color:#fff;}
.btn-run:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(52,211,153,0.3);}
.btn-run:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-stop{background:rgba(251,113,133,0.12);border:1px solid rgba(251,113,133,0.25);color:var(--rose);display:none;padding:12px 18px;}
.btn-refresh{background:none;border:1px solid rgba(251,191,36,0.25);color:var(--amber);font-size:11px;padding:10px 14px;display:none;}
.btn-refresh:hover{background:var(--ag);}

/* Progress */
.progress{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:24px;display:none;}
.progress.show{display:block;}
.pbar-wrap{width:100%;height:5px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden;margin-bottom:12px;}
.pbar{height:100%;width:0;background:linear-gradient(90deg,var(--emerald),var(--cyan));border-radius:3px;transition:width 0.4s ease;}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.ppct{font-family:'Space Mono',monospace;font-size:12px;color:var(--emerald);}
.ptext{font-size:12px;color:var(--t2);}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{font-size:11px;padding:4px 12px;border-radius:100px;background:var(--card);border:1px solid var(--border);color:var(--t3);}
.chip.running{background:var(--eg);border-color:rgba(52,211,153,0.3);color:var(--emerald);animation:pulse 1.5s ease infinite;}
.chip.done{background:var(--eg);border-color:rgba(52,211,153,0.25);color:var(--emerald);}
.chip.cached{background:var(--ag);border-color:rgba(251,191,36,0.25);color:var(--amber);}
.chip.error{background:var(--rg);border-color:rgba(251,113,133,0.25);color:var(--rose);}

/* Error */
.err{display:none;padding:14px 20px;background:var(--rg);border:1px solid rgba(251,113,133,0.2);border-radius:10px;color:var(--rose);font-size:13px;margin-bottom:16px;}
.err.show{display:block;}

/* Scorecard */
.scorecard{display:none;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px 28px 20px;margin-bottom:24px;}
.scorecard.show{display:block;animation:fadeIn .5s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.sc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.sc-header h2{font-size:16px;font-weight:700;color:var(--t1);}
.sc-edit-hint{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:6px;}
.sc-edit-hint .icon{font-size:14px;}
.sc-top{display:flex;gap:24px;align-items:center;margin-bottom:20px;flex-wrap:wrap;}
.sc-donut{position:relative;width:110px;height:110px;flex-shrink:0;}
.sc-donut svg{width:100%;height:100%;transform:rotate(-90deg);}
.d-bg{fill:none;stroke:rgba(255,255,255,0.04);stroke-width:8;}
.d-fill{fill:none;stroke:url(#sg);stroke-width:8;stroke-linecap:round;stroke-dasharray:314;stroke-dashoffset:314;transition:stroke-dashoffset 1s ease;}
.sc-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.sc-n{font-size:28px;font-weight:800;font-family:'Space Mono',monospace;background:linear-gradient(135deg,var(--emerald),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sc-l{font-size:10px;color:var(--t3);margin-top:-2px;}
.sc-tag{font-size:13px;font-weight:700;padding:5px 14px;border-radius:100px;display:inline-block;}
.sc-tag.strong{background:var(--eg);color:var(--emerald);}
.sc-tag.medium{background:var(--ag);color:var(--amber);}
.sc-tag.low{background:var(--rg);color:var(--rose);}
.sc-sum{font-size:13px;color:var(--t2);line-height:1.6;max-width:500px;}

/* Dimensions - Editable */
.dims{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
@media(max-width:640px){.dims{grid-template-columns:1fr;}}
.dim{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:10px;background:rgba(0,0,0,0.15);border:1px solid var(--border);transition:background 0.2s;}
.dim:hover{background:rgba(255,255,255,0.03);}
.dim-score-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;}
.dim-v{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;font-family:'Space Mono',monospace;cursor:pointer;user-select:none;transition:all 0.15s;}
.dim-v.hi{background:var(--eg);color:var(--emerald);}
.dim-v.mid{background:var(--ag);color:var(--amber);}
.dim-v.lo{background:var(--rg);color:var(--rose);}
.dim-v:hover{transform:scale(1.1);box-shadow:0 0 12px rgba(255,255,255,0.1);}
.dim-arrows{display:flex;flex-direction:column;gap:1px;}
.dim-arrow{width:16px;height:14px;display:flex;align-items:center;justify-content:center;border-radius:3px;cursor:pointer;font-size:9px;color:var(--t3);background:rgba(255,255,255,0.03);transition:all 0.15s;}
.dim-arrow:hover{background:rgba(255,255,255,0.1);color:var(--t1);}
.dim-text{flex:1;min-width:0;}
.dim-n{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:2px;}
.dim-r{font-size:11px;color:var(--t3);line-height:1.4;}
.dim-edited{border-color:rgba(52,211,153,0.3) !important;background:rgba(52,211,153,0.03) !important;}
.dim-edited-badge{font-size:8px;background:var(--eg);color:var(--emerald);padding:1px 5px;border-radius:4px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}

/* Research panel */
.research-panel{display:none;background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:24px;overflow:hidden;}
.research-panel.show{display:block;animation:fadeIn .5s ease;}
.rp-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.rp-header:hover{background:var(--hover);}
.rp-header h3{font-size:14px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:8px;}
.rp-toggle{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:4px;}
.rp-content{max-height:0;overflow:hidden;transition:max-height 0.4s ease;}
.rp-content.open{max-height:5000px;}
.rp-inner{padding:0 20px 20px;}
.rp-inner h3{font-size:14px;font-weight:700;color:var(--emerald);margin:16px 0 6px;padding-top:12px;border-top:1px solid var(--border);}
.rp-inner h3:first-child{border-top:none;margin-top:0;padding-top:0;}
.rp-inner h4{font-size:12px;font-weight:600;color:var(--t1);margin:10px 0 4px;}
.rp-inner p{font-size:12px;color:var(--t2);line-height:1.7;margin:4px 0;}
.rp-inner ul{padding-left:18px;margin:4px 0;}
.rp-inner li{font-size:12px;color:var(--t2);line-height:1.6;margin:3px 0;}
.rp-inner table{width:100%;border-collapse:collapse;margin:8px 0;font-size:11px;}
.rp-inner th{background:rgba(52,211,153,0.08);color:var(--emerald);padding:6px 10px;text-align:left;font-weight:600;}
.rp-inner td{padding:6px 10px;border-top:1px solid var(--border);color:var(--t2);}
.rp-inner .cite{font-size:10px;color:var(--cyan);cursor:pointer;text-decoration:underline dotted;}

/* Sources badge */
.src-badge{display:none;align-items:center;gap:4px;font-size:11px;color:var(--cyan);background:var(--cg);padding:5px 12px;border-radius:100px;cursor:pointer;}
.src-badge:hover{opacity:0.8;}

/* Actions bar */
.actions{display:none;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:24px;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;}
.actions.show{display:flex;animation:fadeIn .5s ease;}
.actions-left{display:flex;gap:8px;flex-wrap:wrap;}
.actions-right{display:flex;gap:8px;flex-wrap:wrap;}
.btn-sm{padding:8px 16px;font-size:12px;border-radius:8px;font-weight:600;cursor:pointer;border:none;font-family:'Outfit',sans-serif;transition:all 0.15s;}
.btn-primary{background:linear-gradient(135deg,var(--emerald),#10b981);color:#fff;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(52,211,153,0.3);}
.btn-secondary{background:var(--card);border:1px solid var(--border);color:var(--t2);}
.btn-secondary:hover{background:var(--hover);color:var(--t1);}
.btn-webhook{background:var(--vg);border:1px solid rgba(167,139,250,0.25);color:var(--violet);}
.btn-webhook:hover{background:rgba(167,139,250,0.18);}
.webhook-status{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:4px;}
.webhook-ok{color:var(--emerald);}
.webhook-err{color:var(--rose);}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="app">
  <div class="header">
    <div class="logo-row">
      <div class="logo-icon">🔍</div>
      <div class="logo-stack">
        <h1>ICP Discovery Engine</h1>
        <p>Askit.ai — Ideal Customer Profile Scoring</p>
      </div>
    </div>
    <div class="badge-row">
      <div class="src-badge" id="srcBadge" onclick="toggleResearch()">🌐 <span id="srcNum">0</span> sources</div>
      <div class="badge"><div class="dot g" id="dot"></div><span id="dotText">Ready</span></div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-label">Company URL</div>
    <div class="input-flex">
      <input type="text" class="url-input" id="urlInput" placeholder="e.g. glossier.com" autocomplete="off" spellcheck="false">
      <button class="btn btn-run" id="btnRun" onclick="run()">Analyze</button>
      <button class="btn btn-stop" id="btnStop" onclick="stop()">Stop</button>
      <button class="btn btn-refresh" id="btnRefresh" onclick="refresh()">↻ Refresh</button>
    </div>
  </div>

  <div class="progress" id="prog">
    <div class="pbar-wrap"><div class="pbar" id="pbar"></div></div>
    <div class="prog-row"><span class="ppct" id="ppct">0%</span><span class="ptext" id="ptext">Starting...</span></div>
    <div class="chips" id="chips"></div>
  </div>

  <div class="err" id="err"></div>

  <!-- ICP SCORECARD (with editable dimensions) -->
  <div class="scorecard" id="scorecard">
    <div class="sc-header">
      <h2>ICP Fit Score</h2>
      <div class="sc-edit-hint"><span class="icon">✏️</span> Click scores to adjust (Stage 2)</div>
    </div>
    <div class="sc-top">
      <div class="sc-donut">
        <svg viewBox="0 0 110 110">
          <defs><linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#67e8f9"/></linearGradient></defs>
          <circle class="d-bg" cx="55" cy="55" r="50"/>
          <circle class="d-fill" cx="55" cy="55" r="50" id="donut"/>
        </svg>
        <div class="sc-num"><div class="sc-n" id="scN">-</div><div class="sc-l">of 30</div></div>
      </div>
      <div>
        <div class="sc-tag" id="scTag">-</div>
        <div class="sc-sum" id="scSum"></div>
      </div>
    </div>
    <div class="dims" id="dims"></div>
  </div>

  <!-- RESEARCH PANEL (collapsible) -->
  <div class="research-panel" id="researchPanel">
    <div class="rp-header" onclick="toggleResearch()">
      <h3>📋 Company Research</h3>
      <div class="rp-toggle"><span id="rpToggleText">Show</span> ▾</div>
    </div>
    <div class="rp-content" id="rpContent">
      <div class="rp-inner" id="rpInner"></div>
    </div>
  </div>

  <!-- ACTION BUTTONS -->
  <div class="actions" id="actions">
    <div class="actions-left">
      <button class="btn-sm btn-primary" onclick="exportPDF()">📄 Export PDF</button>
      <button class="btn-sm btn-secondary" onclick="exportDoc()">📝 Export .doc</button>
    </div>
    <div class="actions-right">
      <button class="btn-sm btn-webhook" id="btnWebhook" onclick="fireWebhook()">🔗 Push to Pipeline</button>
      <span class="webhook-status" id="webhookStatus"></span>
    </div>
  </div>
</div>

<script>
let res_content='', src_list=[], icp=null, aborted=false, edited={};
const $=id=>document.getElementById(id);

async function api(s,u,c){const r=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({section:s,url:u,context:c})});if(!r.ok){const e=await r.json().catch(()=>({error:'HTTP '+r.status}));throw new Error(e.error);}return r.json();}
async function clearCache(u){await fetch('/api/clear-cache',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:u})});}

function setChip(id,st){const e=document.getElementById('c-'+id);if(e)e.className='chip '+st;}
function setProg(p,t){$('pbar').style.width=p+'%';$('ppct').textContent=p+'%';if(t)$('ptext').textContent=t;}

// ── ICP SCORE RENDERING (with editable scores) ──
function getVerdict(total){return total>=25?'Strong Fit':total>=15?'Medium Fit':'Low Fit';}
function getVerdictClass(total){return total>=25?'strong':total>=15?'medium':'low';}

function recalcTotal(){
  let total=0;
  icp.dimensions.forEach(d=>{total+=d.score;});
  icp.total=total;
  icp.verdict=getVerdict(total);
  // Update donut
  $('donut').style.strokeDashoffset=314*(1-total/30);
  $('scN').textContent=total;
  const t=$('scTag');t.textContent=icp.verdict;t.className='sc-tag '+getVerdictClass(total);
}

function adjustScore(idx, delta){
  const d=icp.dimensions[idx];
  const newScore=Math.max(0,Math.min(3,d.score+delta));
  if(newScore===d.score) return;
  d.score=newScore;
  edited[idx]=true;
  recalcTotal();
  renderDims();
}

function renderDims(){
  $('dims').innerHTML=icp.dimensions.map((x,i)=>{
    const c=x.score>=3?'hi':x.score>=2?'mid':'lo';
    const isEdited=edited[i];
    return '<div class="dim'+(isEdited?' dim-edited':'')+'">'+
      '<div class="dim-score-wrap">'+
        '<div class="dim-v '+c+'" onclick="cycleScore('+i+')" title="Click to cycle score">'+x.score+'</div>'+
        '<div class="dim-arrows">'+
          '<div class="dim-arrow" onclick="adjustScore('+i+',1)">▲</div>'+
          '<div class="dim-arrow" onclick="adjustScore('+i+',-1)">▼</div>'+
        '</div>'+
      '</div>'+
      '<div class="dim-text">'+
        '<div class="dim-n">'+x.name+(isEdited?' <span class="dim-edited-badge">edited</span>':'')+'</div>'+
        '<div class="dim-r">'+x.reason+'</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function cycleScore(idx){
  const d=icp.dimensions[idx];
  d.score=(d.score+1)%4; // 0→1→2→3→0
  edited[idx]=true;
  recalcTotal();
  renderDims();
}

function renderScore(d){
  $('donut').style.strokeDashoffset=314*(1-d.total/30);
  $('scN').textContent=d.total;
  $('scSum').textContent=d.summary||'';
  const t=$('scTag');t.textContent=d.verdict;t.className='sc-tag '+getVerdictClass(d.total);
  renderDims();
  $('scorecard').classList.add('show');
}

// ── RESEARCH PANEL ──
function toggleResearch(){
  const c=$('rpContent');
  const open=c.classList.toggle('open');
  $('rpToggleText').textContent=open?'Hide':'Show';
}

// ── MAIN RUN ──
async function run(fr){
  const url=$('urlInput').value.trim();if(!url)return;
  if(fr)await clearCache(url);
  aborted=false;res_content='';src_list=[];icp=null;edited={};
  $('btnRun').disabled=true;$('btnStop').style.display='';$('btnRefresh').style.display='none';
  $('err').classList.remove('show');$('prog').classList.add('show');
  $('scorecard').classList.remove('show');$('researchPanel').classList.remove('show');
  $('actions').classList.remove('show');
  $('srcBadge').style.display='none';$('dot').className='dot g';$('dotText').textContent='Researching...';
  $('webhookStatus').textContent='';
  $('chips').innerHTML=['Research','ICP Score'].map((l,i)=>'<span class="chip" id="c-'+['research','icp'][i]+'">'+l+'</span>').join('');

  let cached=false;

  // Step 1: Research
  setProg(20,'Researching company...');
  setChip('research','running');
  try{
    const d=await api('research',url);
    if(d.cached)cached=true;
    if(d.sources&&d.sources.length)src_list=d.sources;
    res_content=d.content;
    if(d.content.includes('Company Not Found')){
      $('err').textContent='Company not found at '+url+'. Please check the URL.';
      $('err').classList.add('show');setChip('research','error');
      $('btnRun').disabled=false;$('btnStop').style.display='none';
      setProg(100,'Failed');return;
    }
    setChip('research',d.cached?'cached':'done');
    // Show research
    $('rpInner').innerHTML=res_content;
    $('researchPanel').classList.add('show');
    if(src_list.length){$('srcNum').textContent=src_list.length;$('srcBadge').style.display='flex';}
    // Activate cite links
    document.querySelectorAll('.cite[data-source]').forEach(el=>{el.style.cursor='pointer';el.onclick=()=>window.open(el.dataset.source,'_blank');});
  }catch(err){
    setChip('research','error');
    $('err').textContent='Research failed: '+err.message;$('err').classList.add('show');
    $('btnRun').disabled=false;$('btnStop').style.display='none';
    setProg(100,'Failed');return;
  }

  if(aborted){finish(cached);return;}
  await new Promise(r=>setTimeout(r,300));

  // Step 2: ICP Score
  setProg(60,'Scoring ICP fit...');
  setChip('icp','running');
  try{
    const d=await api('icp',url,res_content);
    if(d.cached)cached=true;
    try{
      const cl=d.content.replace(/```json|```/g,'').trim();
      const m=cl.match(/\{[\s\S]*\}/);
      icp=JSON.parse(m?m[0]:cl);
      renderScore(icp);
    }catch(e){console.error('ICP parse:',e);}
    setChip('icp',d.cached?'cached':'done');
  }catch(err){
    setChip('icp','error');
    console.error('ICP error:',err);
  }

  finish(cached);
}

function finish(cached){
  setProg(100,aborted?'Stopped':'Complete');
  $('btnRun').disabled=false;$('btnStop').style.display='none';
  if(icp)$('actions').classList.add('show');
  if(cached){$('btnRefresh').style.display='';$('dot').className='dot a';$('dotText').textContent='Cached';}
  else{$('dot').className='dot g';$('dotText').textContent='Live';}

  // Auto-fire webhook if ICP ≥ 15
  if(icp && icp.total >= 15 && !aborted){
    fireWebhookSilent();
  }
}

function stop(){aborted=true;$('btnRun').disabled=false;$('btnStop').style.display='none';}
function refresh(){run(true);}

// ── WEBHOOK ──
async function fireWebhookSilent(){
  const url=$('urlInput').value.trim();
  try{
    const r=await fetch('/api/fire-webhook',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url,icp,research:res_content})});
    const d=await r.json();
    if(d.success)console.log('✓ n8n webhook fired');
  }catch(e){console.log('⚠ Webhook:',e.message);}
}

async function fireWebhook(){
  const url=$('urlInput').value.trim();
  if(!url||!icp)return;
  $('webhookStatus').innerHTML='<span style="color:var(--amber)">Pushing...</span>';
  try{
    const r=await fetch('/api/fire-webhook',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url,icp,research:res_content})});
    const d=await r.json();
    if(d.success){
      $('webhookStatus').innerHTML='<span class="webhook-ok">✓ Pushed to pipeline</span>';
    }else{
      $('webhookStatus').innerHTML='<span class="webhook-err">⚠ '+( d.reason||d.error||'Not fired')+'</span>';
    }
  }catch(e){
    $('webhookStatus').innerHTML='<span class="webhook-err">✗ '+e.message+'</span>';
  }
}

if(icp){

    doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(...G);doc.text(doc.splitTextToSize(d.reason,CW-93)[0]||'',ML+90,y+5);y+=7;
  });

// Sources page
if(src_list.length){

}
