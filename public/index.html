<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICP Discovery Engine</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;
  --border:#2a2a3a;--border2:#3a3a4e;
  --t1:#eeeef5;--t2:#a0a0b8;--t3:#606078;
  --accent:#6ee7b7;--accent2:#34d399;--accent-bg:rgba(110,231,183,0.08);--accent-border:rgba(110,231,183,0.2);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,0.08);--blue-border:rgba(96,165,250,0.2);
  --amber:#fbbf24;--amber-bg:rgba(251,191,36,0.08);--amber-border:rgba(251,191,36,0.2);
  --rose:#fb7185;--rose-bg:rgba(251,113,133,0.08);--rose-border:rgba(251,113,133,0.2);
  --violet:#a78bfa;--violet-bg:rgba(167,139,250,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
::selection{background:var(--accent);color:var(--bg);}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* Layout */
.wrap{max-width:960px;margin:0 auto;padding:0 24px;}

/* Header */
.header{padding:40px 0 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;}
.brand{display:flex;align-items:center;gap:14px;}
.brand-mark{width:40px;height:40px;background:linear-gradient(135deg,var(--accent2),var(--blue));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--bg);}
.brand h1{font-size:22px;font-weight:700;color:var(--t1);letter-spacing:-0.5px;}
.brand p{font-size:12px;color:var(--t3);margin-top:1px;}
.status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t3);background:var(--bg2);border:1px solid var(--border);padding:6px 14px;border-radius:100px;}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s ease infinite;}
.status-dot.working{background:var(--amber);box-shadow:0 0 8px var(--amber);}
.status-dot.error{background:var(--rose);box-shadow:0 0 8px var(--rose);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Search */
.search-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:24px;}
.search-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--t3);margin-bottom:12px;}
.search-row{display:flex;gap:10px;}
.search-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 18px;color:var(--t1);font-family:'JetBrains Mono',monospace;font-size:14px;outline:none;transition:border-color .2s;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--t3);}
.btn{border:none;border-radius:10px;padding:14px 28px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-go{background:var(--accent2);color:var(--bg);letter-spacing:0.3px;}
.btn-go:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(52,211,153,.25);}
.btn-go:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-stop{background:var(--rose-bg);border:1px solid var(--rose-border);color:var(--rose);padding:14px 20px;display:none;}
.btn-refresh{background:var(--bg);border:1px solid var(--amber-border);color:var(--amber);font-size:12px;padding:14px 16px;display:none;}

/* Progress */
.progress{display:none;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:24px;}
.progress.show{display:block;}
.pbar-track{width:100%;height:4px;background:var(--bg);border-radius:2px;overflow:hidden;margin-bottom:14px;}
.pbar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent2),var(--blue));border-radius:2px;transition:width .5s ease;}
.prog-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.prog-pct{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent);}
.prog-text{font-size:13px;color:var(--t2);}
.prog-steps{display:flex;gap:8px;}
.step-chip{font-size:11px;padding:4px 12px;border-radius:100px;background:var(--bg);border:1px solid var(--border);color:var(--t3);transition:all .3s;}
.step-chip.active{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent);animation:pulse 1.5s ease infinite;}
.step-chip.done{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent);}
.step-chip.cached{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber);}
.step-chip.fail{background:var(--rose-bg);border-color:var(--rose-border);color:var(--rose);}

/* Error */
.error-msg{display:none;padding:16px 20px;background:var(--rose-bg);border:1px solid var(--rose-border);border-radius:10px;color:var(--rose);font-size:13px;margin-bottom:20px;}
.error-msg.show{display:block;}

/* ═══ RESULTS ═══ */
.results{display:none;}
.results.show{display:block;animation:slideUp .5s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* Company card */
.company-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px;}
.cc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:16px;flex-wrap:wrap;}
.cc-name{font-size:20px;font-weight:700;color:var(--t1);}
.cc-url{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);margin-top:2px;}
.cc-badges{display:flex;gap:6px;flex-wrap:wrap;}
.cc-badge{font-size:11px;padding:4px 10px;border-radius:6px;background:var(--bg);border:1px solid var(--border);color:var(--t2);}
.cc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
@media(max-width:640px){.cc-grid{grid-template-columns:1fr 1fr;}}
.cc-stat{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;}
.cc-stat-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:4px;}
.cc-stat-value{font-size:14px;font-weight:600;color:var(--t1);}

/* Section headers */
.section{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:16px;overflow:hidden;}
.sec-header{padding:18px 22px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background .15s;}
.sec-header:hover{background:rgba(255,255,255,.02);}
.sec-header h3{font-size:15px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:10px;}
.sec-icon{font-size:16px;}
.sec-toggle{font-size:11px;color:var(--t3);transition:transform .3s;}
.sec-toggle.open{transform:rotate(180deg);}
.sec-body{max-height:0;overflow:hidden;transition:max-height .4s ease;}
.sec-body.open{max-height:10000px;}
.sec-inner{padding:0 22px 22px;}

/* Editable fields */
.field-group{margin-bottom:16px;}
.field-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.field-label .edited-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);display:none;}
.field-value{font-size:13px;color:var(--t2);line-height:1.7;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;outline:none;transition:border-color .2s;min-height:38px;white-space:pre-wrap;word-break:break-word;}
.field-value:focus{border-color:var(--accent);color:var(--t1);}
.field-value[contenteditable="true"]:hover{border-color:var(--border2);}
.field-value.edited{border-color:var(--accent-border);background:rgba(110,231,183,0.03);}

/* Lists */
.list-items{display:flex;flex-direction:column;gap:6px;}
.list-item{display:flex;gap:10px;align-items:flex-start;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;}
.list-item-main{flex:1;min-width:0;}
.list-item-title{font-size:13px;font-weight:600;color:var(--t1);}
.list-item-sub{font-size:12px;color:var(--t3);margin-top:2px;line-height:1.5;}
.list-item-badge{font-size:10px;padding:3px 8px;border-radius:5px;font-weight:600;white-space:nowrap;}
.badge-high{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border);}
.badge-med{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
.badge-low{background:var(--rose-bg);color:var(--rose);border:1px solid var(--rose-border);}
.badge-info{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border);}

/* Add item */
.add-row{display:flex;gap:8px;margin-top:8px;}
.add-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--t1);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;}
.add-input:focus{border-color:var(--accent);}
.add-input::placeholder{color:var(--t3);}
.btn-add{background:var(--accent-bg);border:1px solid var(--accent-border);color:var(--accent);padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-add:hover{background:rgba(110,231,183,0.15);}
.btn-remove{background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;}
.btn-remove:hover{background:var(--rose-bg);color:var(--rose);}

/* Confidence */
.confidence{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:6px 14px;border-radius:100px;font-weight:600;}
.conf-high{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border);}
.conf-medium{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
.conf-low{background:var(--rose-bg);color:var(--rose);border:1px solid var(--rose-border);}

/* Sources */
.sources-panel{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px 22px;margin-bottom:20px;}
.sources-panel h4{font-size:13px;font-weight:600;color:var(--t2);margin-bottom:10px;}
.src-link{display:block;font-size:12px;color:var(--blue);text-decoration:none;padding:4px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.src-link:hover{color:var(--accent);}

/* Action bar */
.action-bar{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px 22px;margin-bottom:40px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.action-left{display:flex;gap:8px;flex-wrap:wrap;}
.action-right{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.btn-action{padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s;}
.btn-primary{background:var(--accent2);color:var(--bg);}
.btn-primary:hover{box-shadow:0 4px 16px rgba(52,211,153,.3);transform:translateY(-1px);}
.btn-outline{background:none;border:1px solid var(--border);color:var(--t2);}
.btn-outline:hover{border-color:var(--t2);color:var(--t1);}
.edit-count{font-size:11px;color:var(--accent);font-family:'JetBrains Mono',monospace;}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="brand">
      <div class="brand-mark">ICP</div>
      <div>
        <h1>ICP Discovery Engine</h1>
        <p>Build an Ideal Customer Profile from any company URL</p>
      </div>
    </div>
    <div class="status"><div class="status-dot" id="statusDot"></div><span id="statusText">Ready</span></div>
  </div>

  <div class="search-box">
    <div class="search-label">Company URL</div>
    <div class="search-row">
      <input type="text" class="search-input" id="urlInput" placeholder="e.g. notion.so, figma.com, glossier.com" autocomplete="off" spellcheck="false">
      <button class="btn btn-go" id="btnGo" onclick="run()">Build ICP</button>
      <button class="btn btn-stop" id="btnStop" onclick="stop()">Stop</button>
      <button class="btn btn-refresh" id="btnRefresh" onclick="run(true)">↻ Refresh</button>
    </div>
  </div>

  <div class="progress" id="progress">
    <div class="pbar-track"><div class="pbar-fill" id="pbarFill"></div></div>
    <div class="prog-info"><span class="prog-pct" id="progPct">0%</span><span class="prog-text" id="progText">Starting...</span></div>
    <div class="prog-steps">
      <span class="step-chip" id="step-research">Company Research</span>
      <span class="step-chip" id="step-icp">ICP Analysis</span>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <!-- ═══ RESULTS ═══ -->
  <div class="results" id="results">

    <!-- Company Overview -->
    <div class="company-card" id="companyCard"></div>

    <!-- ICP Sections -->
    <div id="icpSections"></div>

    <!-- Sources -->
    <div class="sources-panel" id="sourcesPanel" style="display:none"></div>

    <!-- Actions -->
    <div class="action-bar" id="actionBar">
      <div class="action-left">
        <button class="btn-action btn-primary" onclick="downloadJSON()">⬇ Download JSON</button>
        <button class="btn-action btn-outline" onclick="copyJSON()">📋 Copy JSON</button>
      </div>
      <div class="action-right">
        <span class="edit-count" id="editCount"></span>
        <button class="btn-action btn-outline" onclick="resetEdits()">↺ Reset Edits</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── STATE ──
let companyData = null;
let icpData = null;
let originalIcp = null;
let allSources = [];
let aborted = false;
let editCount = 0;

const $ = id => document.getElementById(id);

// ── API ──
async function api(section, url, context) {
  const r = await fetch('/api/generate', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ section, url, context })
  });
  if (!r.ok) { const e = await r.json().catch(() => ({ error: 'HTTP ' + r.status })); throw new Error(e.error); }
  return r.json();
}

async function clearCache(url) {
  await fetch('/api/clear-cache', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url }) });
}

function parseJSON(raw) {
  let s = raw.trim();
  // Strip markdown fences
  s = s.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/i, '');
  // Find the JSON object
  const match = s.match(/\{[\s\S]*\}/);
  if (match) return JSON.parse(match[0]);
  throw new Error('No JSON found in response');
}

// ── PROGRESS ──
function setProg(pct, text) {
  $('pbarFill').style.width = pct + '%';
  $('progPct').textContent = pct + '%';
  if (text) $('progText').textContent = text;
}
function setStep(id, cls) {
  $('step-' + id).className = 'step-chip ' + cls;
}
function setStatus(text, cls) {
  $('statusText').textContent = text;
  $('statusDot').className = 'status-dot' + (cls ? ' ' + cls : '');
}

// ── MAIN RUN ──
async function run(force) {
  const url = $('urlInput').value.trim();
  if (!url) return;
  if (force) await clearCache(url);

  aborted = false; companyData = null; icpData = null; originalIcp = null; allSources = []; editCount = 0;
  $('btnGo').disabled = true; $('btnStop').style.display = ''; $('btnRefresh').style.display = 'none';
  $('errorMsg').classList.remove('show');
  $('results').classList.remove('show');
  $('progress').classList.add('show');
  setStatus('Researching...', 'working');
  setStep('research', ''); setStep('icp', '');

  let cached = false;

  // ── STEP 1: Research ──
  setProg(15, 'Deep-researching company...');
  setStep('research', 'active');
  try {
    const d = await api('research', url);
    if (d.cached) cached = true;
    if (d.sources) allSources.push(...d.sources);

    const parsed = parseJSON(d.content);
    if (parsed.error) {
      $('errorMsg').textContent = parsed.error;
      $('errorMsg').classList.add('show');
      setStep('research', 'fail'); finish(cached); return;
    }
    companyData = parsed.company || parsed;
    setStep('research', d.cached ? 'cached' : 'done');
  } catch (err) {
    setStep('research', 'fail');
    $('errorMsg').textContent = 'Research failed: ' + err.message;
    $('errorMsg').classList.add('show');
    finish(cached); return;
  }

  if (aborted) { finish(cached); return; }
  await sleep(300);

  // ── STEP 2: Build ICP ──
  setProg(50, 'Building Ideal Customer Profile...');
  setStep('icp', 'active');
  try {
    const d = await api('icp', url, JSON.stringify(companyData));
    if (d.cached) cached = true;
    if (d.sources) allSources.push(...d.sources);

    const parsed = parseJSON(d.content);
    icpData = parsed.icp || parsed;
    // Store methodology, confidence, sources at top level
    icpData._methodology = parsed.methodology || '';
    icpData._confidence = parsed.confidence || 'medium';
    icpData._sources = parsed.sources || [];

    originalIcp = JSON.parse(JSON.stringify(icpData));
    setStep('icp', d.cached ? 'cached' : 'done');
  } catch (err) {
    setStep('icp', 'fail');
    console.error('ICP error:', err);
    // Continue — show research at least
  }

  setProg(100, 'Complete');
  renderResults();
  finish(cached);
}

function finish(cached) {
  $('btnGo').disabled = false; $('btnStop').style.display = 'none';
  if (cached) { $('btnRefresh').style.display = ''; setStatus('Cached', ''); }
  else { setStatus('Complete', ''); }
}

function stop() { aborted = true; $('btnGo').disabled = false; $('btnStop').style.display = 'none'; setStatus('Stopped', 'error'); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── RENDER ──
function renderResults() {
  if (!companyData && !icpData) return;
  renderCompanyCard();
  renderICPSections();
  renderSources();
  $('results').classList.add('show');
  updateEditCount();
}

function safe(v) { return v || '—'; }

function renderCompanyCard() {
  const c = companyData;
  if (!c) { $('companyCard').style.display = 'none'; return; }

  const badges = [];
  if (c.industry) badges.push(c.industry);
  if (c.sub_industry) badges.push(c.sub_industry);
  if (c.business_model) badges.push(c.business_model);
  if (c.funding_stage) badges.push(c.funding_stage);

  const stats = [
    { label: 'Employees', value: safe(c.employee_count || c.employee_range) },
    { label: 'Revenue', value: safe(c.revenue_estimate) },
    { label: 'Funding', value: safe(c.funding_total) },
    { label: 'Founded', value: safe(c.founded) },
    { label: 'HQ', value: safe(c.headquarters) },
    { label: 'Pricing', value: safe(c.pricing_model) },
  ].filter(s => s.value !== '—');

  $('companyCard').innerHTML = `
    <div class="cc-top">
      <div>
        <div class="cc-name">${safe(c.name)}</div>
        <div class="cc-url">${safe(c.url)}</div>
      </div>
      <div class="cc-badges">${badges.map(b => `<span class="cc-badge">${b}</span>`).join('')}</div>
    </div>
    ${c.description ? `<p style="font-size:13px;color:var(--t2);line-height:1.7;margin-bottom:16px;">${c.description}</p>` : ''}
    ${c.value_proposition ? `<p style="font-size:12px;color:var(--accent);margin-bottom:16px;font-style:italic;">"${c.value_proposition}"</p>` : ''}
    <div class="cc-grid">${stats.map(s => `<div class="cc-stat"><div class="cc-stat-label">${s.label}</div><div class="cc-stat-value">${s.value}</div></div>`).join('')}</div>
  `;
  $('companyCard').style.display = '';
}

function renderICPSections() {
  if (!icpData) { $('icpSections').innerHTML = ''; return; }
  const icp = icpData;

  let html = '';

  // Confidence + Methodology
  const confClass = icp._confidence === 'high' ? 'conf-high' : icp._confidence === 'low' ? 'conf-low' : 'conf-medium';
  html += `<div style="margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
    <span class="confidence ${confClass}">Confidence: ${safe(icp._confidence)}</span>
    ${icp._methodology ? `<span style="font-size:12px;color:var(--t3);">${icp._methodology}</span>` : ''}
  </div>`;

  // Summary
  if (icp.summary) {
    html += makeEditableField('summary', 'ICP Summary', icp.summary);
  }

  // Firmographics
  if (icp.firmographics) {
    const f = icp.firmographics;
    html += openSection('firmographics', '🏢', 'Firmographics', true);
    if (f.company_size) {
      html += makeEditableField('firmographics.company_size.sweet_spot', 'Company Size (Sweet Spot)', f.company_size.sweet_spot || `${f.company_size.min_employees}–${f.company_size.max_employees} employees`);
      html += makeEditableField('firmographics.company_size.reasoning', 'Size Reasoning', f.company_size.reasoning);
    }
    if (f.revenue_range) {
      html += makeEditableField('firmographics.revenue_range.sweet_spot', 'Revenue Sweet Spot', f.revenue_range.sweet_spot || `${f.revenue_range.min} – ${f.revenue_range.max}`);
      html += makeEditableField('firmographics.revenue_range.reasoning', 'Revenue Reasoning', f.revenue_range.reasoning);
    }
    html += makeEditableField('firmographics.company_stage', 'Company Stage', f.company_stage);
    if (f.industries && f.industries.length) {
      html += makeListSection('firmographics.industries', 'Target Industries', f.industries, i => i.name, i => i.fit_reason, 'badge-info');
    }
    if (f.geographies && f.geographies.length) {
      html += makeListSection('firmographics.geographies', 'Geographies', f.geographies, g => g.region, g => g.reasoning, 'badge-info');
    }
    html += closeSection();
  }

  // Demographics (Buying Committee)
  if (icp.demographics) {
    const d = icp.demographics;
    html += openSection('demographics', '👥', 'Buying Committee', true);
    if (d.primary_buyer) {
      html += makeEditableField('demographics.primary_buyer.title', 'Primary Buyer Title', d.primary_buyer.title);
      html += makeEditableField('demographics.primary_buyer.department', 'Department', d.primary_buyer.department);
      html += makeEditableField('demographics.primary_buyer.seniority', 'Seniority', d.primary_buyer.seniority);
      html += makeEditableField('demographics.primary_buyer.reasoning', 'Why This Buyer', d.primary_buyer.reasoning);
    }
    if (d.secondary_buyers && d.secondary_buyers.length) {
      html += makeListSection('demographics.secondary_buyers', 'Secondary Buyers', d.secondary_buyers, b => `${b.title} (${b.department})`, b => b.role_in_decision, 'badge-med');
    }
    if (d.influencers && d.influencers.length) {
      html += makeListSection('demographics.influencers', 'Influencers', d.influencers, i => `${i.title} (${i.department})`, i => i.influence_type, 'badge-info');
    }
    if (d.end_users && d.end_users.length) {
      html += makeListSection('demographics.end_users', 'End Users', d.end_users, u => u.role, u => u.how_they_use, 'badge-info');
    }
    html += closeSection();
  }

  // Psychographics
  if (icp.psychographics) {
    const p = icp.psychographics;
    html += openSection('psychographics', '🧠', 'Psychographics', true);
    if (p.pain_points && p.pain_points.length) {
      html += makeListSection('psychographics.pain_points', 'Pain Points', p.pain_points, x => x.pain, x => x.evidence, null, x => x.severity);
    }
    if (p.goals && p.goals.length) {
      html += makeListSection('psychographics.goals', 'Goals', p.goals, x => x.goal, x => x.evidence, 'badge-info', x => x.priority);
    }
    if (p.buying_triggers && p.buying_triggers.length) {
      html += makeListSection('psychographics.buying_triggers', 'Buying Triggers', p.buying_triggers, x => x.trigger, x => x.timing, 'badge-med');
    }
    if (p.objections && p.objections.length) {
      html += makeListSection('psychographics.objections', 'Common Objections', p.objections, x => x.objection, x => x.how_to_handle, 'badge-low');
    }
    html += closeSection();
  }

  // Technographics
  if (icp.technographics) {
    const t = icp.technographics;
    html += openSection('technographics', '⚙️', 'Technographics', false);
    html += makeEditableField('technographics.tech_maturity', 'Tech Maturity', t.tech_maturity);
    if (t.current_tools_they_likely_use && t.current_tools_they_likely_use.length) {
      html += makeListSection('technographics.tools', 'Tools They Likely Use', t.current_tools_they_likely_use, x => x.tool, x => `${x.category} — ${x.relevance}`, 'badge-info');
    }
    if (t.integration_requirements && t.integration_requirements.length) {
      html += `<div class="field-group"><div class="field-label">Integration Requirements</div><div style="display:flex;flex-wrap:wrap;gap:6px;">${t.integration_requirements.map(x => `<span class="cc-badge">${x}</span>`).join('')}</div></div>`;
    }
    html += closeSection();
  }

  // Behavioral
  if (icp.behavioral) {
    const b = icp.behavioral;
    html += openSection('behavioral', '📊', 'Behavioral', false);
    html += makeEditableField('behavioral.buying_process', 'Buying Process', b.buying_process);
    html += makeEditableField('behavioral.typical_sales_cycle', 'Sales Cycle', b.typical_sales_cycle);
    html += makeEditableField('behavioral.budget_range', 'Budget Range', b.budget_range);
    if (b.decision_criteria && b.decision_criteria.length) {
      html += `<div class="field-group"><div class="field-label">Decision Criteria</div><div style="display:flex;flex-wrap:wrap;gap:6px;">${b.decision_criteria.map(x => `<span class="cc-badge">${x}</span>`).join('')}</div></div>`;
    }
    if (b.preferred_channels && b.preferred_channels.length) {
      html += `<div class="field-group"><div class="field-label">Preferred Channels</div><div style="display:flex;flex-wrap:wrap;gap:6px;">${b.preferred_channels.map(x => `<span class="cc-badge">${x}</span>`).join('')}</div></div>`;
    }
    html += closeSection();
  }

  // Disqualifiers
  if (icp.disqualifiers && icp.disqualifiers.length) {
    html += openSection('disqualifiers', '🚫', 'Disqualifiers', false);
    html += makeListSection('disqualifiers', 'Bad Fit Signals', icp.disqualifiers, x => x.signal, x => x.why_bad_fit, 'badge-low');
    html += closeSection();
  }

  // Look-alikes
  if (icp.look_alike_companies && icp.look_alike_companies.length) {
    html += openSection('lookalikes', '🔄', 'Look-Alike Companies', false);
    html += makeListSection('look_alike_companies', 'Similar Companies', icp.look_alike_companies, x => x.name, x => x.why_similar, 'badge-info');
    html += closeSection();
  }

  $('icpSections').innerHTML = html;

  // Wire up toggles
  document.querySelectorAll('.sec-header').forEach(h => {
    h.addEventListener('click', () => {
      const body = h.nextElementSibling;
      const toggle = h.querySelector('.sec-toggle');
      body.classList.toggle('open');
      toggle.classList.toggle('open');
    });
  });

  // Wire up editable fields
  document.querySelectorAll('.field-value[contenteditable]').forEach(el => {
    el.addEventListener('input', () => {
      el.classList.add('edited');
      const dot = el.parentElement.querySelector('.edited-dot');
      if (dot) dot.style.display = 'inline-block';
      updateEditCount();
    });
  });
}

// ── SECTION BUILDERS ──
function openSection(id, icon, title, startOpen) {
  return `<div class="section"><div class="sec-header"><h3><span class="sec-icon">${icon}</span>${title}</h3><span class="sec-toggle${startOpen ? ' open' : ''}">▼</span></div><div class="sec-body${startOpen ? ' open' : ''}"><div class="sec-inner">`;
}
function closeSection() {
  return `</div></div></div>`;
}

function makeEditableField(path, label, value) {
  if (!value) return '';
  return `<div class="field-group"><div class="field-label"><span class="edited-dot"></span>${label}</div><div class="field-value" contenteditable="true" data-path="${path}">${escHtml(value)}</div></div>`;
}

function makeListSection(path, label, items, titleFn, subFn, badgeClass, severityFn) {
  if (!items || !items.length) return '';
  let html = `<div class="field-group"><div class="field-label">${label}</div><div class="list-items">`;
  items.forEach((item, i) => {
    const title = titleFn(item);
    const sub = subFn(item);
    let badge = '';
    if (severityFn) {
      const sev = severityFn(item) || '';
      const bc = sev.toLowerCase().includes('high') ? 'badge-high' : sev.toLowerCase().includes('low') ? 'badge-low' : 'badge-med';
      badge = sev ? `<span class="list-item-badge ${bc}">${escHtml(sev)}</span>` : '';
    } else if (badgeClass) {
      badge = '';
    }
    html += `<div class="list-item"><div class="list-item-main"><div class="list-item-title">${escHtml(title)}</div>${sub ? `<div class="list-item-sub">${escHtml(sub)}</div>` : ''}</div>${badge}</div>`;
  });
  html += `</div></div>`;
  return html;
}

function escHtml(s) {
  if (!s) return '';
  const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML;
}

function renderSources() {
  // Dedupe
  const seen = new Set();
  const unique = [];
  const all = [...allSources, ...(icpData?._sources || [])];
  for (const s of all) {
    const u = s.url || '';
    if (u && !seen.has(u)) { seen.add(u); unique.push(s); }
  }
  if (!unique.length) { $('sourcesPanel').style.display = 'none'; return; }
  $('sourcesPanel').innerHTML = `<h4>🌐 ${unique.length} Sources Used</h4>` +
    unique.map(s => `<a class="src-link" href="${s.url}" target="_blank">${s.title || s.url}</a>`).join('');
  $('sourcesPanel').style.display = '';
}

// ── EDIT TRACKING ──
function updateEditCount() {
  const edits = document.querySelectorAll('.field-value.edited').length;
  editCount = edits;
  $('editCount').textContent = edits > 0 ? `${edits} field${edits > 1 ? 's' : ''} edited` : '';
}

function resetEdits() {
  if (!originalIcp) return;
  icpData = JSON.parse(JSON.stringify(originalIcp));
  editCount = 0;
  renderICPSections();
  renderSources();
  updateEditCount();
}

// ── BUILD FINAL JSON ──
function buildFinalJSON() {
  // Collect edits from contenteditable fields
  const editedIcp = JSON.parse(JSON.stringify(icpData));
  document.querySelectorAll('.field-value[data-path]').forEach(el => {
    const path = el.dataset.path;
    const value = el.textContent.trim();
    setNestedValue(editedIcp, path, value);
  });

  // Clean internal fields
  const clean = JSON.parse(JSON.stringify(editedIcp));
  const methodology = clean._methodology; delete clean._methodology;
  const confidence = clean._confidence; delete clean._confidence;
  const icpSources = clean._sources; delete clean._sources;

  return {
    generated_at: new Date().toISOString(),
    company_url: $('urlInput').value.trim(),
    company: companyData || {},
    icp: clean,
    methodology: methodology || '',
    confidence: confidence || '',
    sources: dedupeSources([...allSources, ...(icpSources || [])]),
    edits_made: editCount
  };
}

function setNestedValue(obj, path, value) {
  const keys = path.split('.');
  let current = obj;
  for (let i = 0; i < keys.length - 1; i++) {
    if (!current[keys[i]]) return;
    current = current[keys[i]];
  }
  current[keys[keys.length - 1]] = value;
}

function dedupeSources(arr) {
  const seen = new Set(); const out = [];
  for (const s of arr) { if (s.url && !seen.has(s.url)) { seen.add(s.url); out.push(s); } }
  return out;
}

// ── DOWNLOAD / COPY ──
function downloadJSON() {
  const data = buildFinalJSON();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const domain = $('urlInput').value.trim().replace(/[^a-zA-Z0-9]/g, '_');
  a.download = `ICP_${domain}_${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
}

function copyJSON() {
  const data = buildFinalJSON();
  navigator.clipboard.writeText(JSON.stringify(data, null, 2)).then(() => {
    const btn = document.querySelector('.btn-outline');
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

// ── KEY BINDING ──
$('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter' && !$('btnGo').disabled) run(); });
</script>
